<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Employee Login</title>
  <link rel="stylesheet" href="/assets/css/style.css"/>
</head>
<body class="bg">
  <div class="shell">
    <div class="card">
      <div class="top">
        <div>
          <h1>دخول الموظف</h1>
          <div class="muted">سجّل دخولك ثم سجل حضور/انصراف</div>
        </div>
      </div>

      <label>Username</label>
      <input id="username" placeholder="مثال: emp1"/>

      <label>Password</label>
      <input id="password" type="password" placeholder="••••••"/>

      <button class="btn block" id="btn">دخول</button>
      <div class="msg" id="msg"></div>

      <div class="muted small" style="margin-top:10px">Demo: emp1 / 123456</div>
    </div>
  </div>

  <script src="/assets/js/common.js"></script>
  <script>
    qs('btn').onclick = async () => {
      try{
        setMsg('');
        const username = qs('username').value.trim();
        const password = qs('password').value;
        const deviceId = getDeviceId();

        const data = await api('/api/auth/login', {
          method:'POST',
          body: JSON.stringify({ username, password, deviceId })
        });

        if(data.user.role !== 'employee'){
          clearAuth();
          return setMsg('هذا الحساب ليس موظف');
        }

        saveToken(data.accessToken);
        go('/employee/attendance.html');
      }catch(e){
        setMsg('❌ ' + e.message);
      }
    };
  </script>
</body>
</html>
