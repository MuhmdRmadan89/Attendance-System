<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#1f7aa8" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>دخول الإدارة - إنجاز</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="bg">
  <div class="shell">
    <div class="card">
      <h1>دخول الإدارة</h1>
      <div class="muted">لوحة تحكم إنجاز</div>

      <label>اسم المستخدم</label>
      <input id="username" placeholder="admin" />

      <label>كلمة المرور</label>
      <input id="password" type="password" placeholder="******" />

      <button class="btn block" id="loginBtn">دخول</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script src="/assets/js/common.js"></script>
  <script>
    qs('loginBtn').onclick = async () => {
      try {
        setMsg('');
        const username = qs('username').value.trim();
        const password = qs('password').value;

        const data = await api('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ username, password, deviceId: 'ADMIN_DEVICE' }),
        });

        if (data.user.role !== 'admin') {
          clearAuth();
          setMsg('هذا الحساب ليس إداري');
          return;
        }

        saveToken(data.accessToken);
        go('/admin/dashboard.html');
      } catch (error) {
        setMsg(error.message);
      }
    };
  </script>
</body>
</html>
