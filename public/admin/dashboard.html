<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#2a8fc4" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>لوحة الإدارة - إنجاز</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="bg">
  <div class="shell">
    <div class="card wide">
      <div class="top">
        <div>
          <h1>لوحة الإدارة</h1>
          <div class="muted">متابعة الحضور المباشر</div>
        </div>
        <div class="navbar">
          <button class="link" id="employeesPage">الموظفون</button>
          <button class="link" id="payrollPage">الرواتب</button>
          <button class="link" id="reportsPage">التقارير</button>
          <button class="link" id="logoutBtn">خروج</button>
        </div>
      </div>

      <div class="row">
        <div class="field" style="max-width:220px">
          <label>التاريخ</label>
          <input type="date" id="date" />
        </div>
        <button class="btn" id="loadBtn">تحديث</button>
      </div>

      <div class="kpis">
        <div class="kpi"><div class="label">إجمالي الموظفين</div><div class="value" id="totalEmployees">0</div></div>
        <div class="kpi"><div class="label">متواجدون الآن</div><div class="value" id="onlineCount">0</div></div>
        <div class="kpi"><div class="label">دخول اليوم</div><div class="value" id="todayIn">0</div></div>
        <div class="kpi"><div class="label">انصراف اليوم</div><div class="value" id="todayOut">0</div></div>
      </div>

      <h2 style="margin-top:14px">الحضور اليومي</h2>
      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>الموظف</th>
              <th>الدخول</th>
              <th>الخروج</th>
              <th>مسافة الدخول</th>
              <th>مسافة الخروج</th>
            </tr>
          </thead>
          <tbody id="body"></tbody>
        </table>
      </div>

      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script src="/assets/js/common.js"></script>
  <script>
    if (!ensureAuthOrRedirect('/admin/login.html')) throw new Error('auth required');

    qs('date').value = new Date().toISOString().slice(0, 10);
    qs('logoutBtn').onclick = () => { clearAuth(); go('/admin/login.html'); };
    qs('employeesPage').onclick = () => go('/admin/employees.html');
    qs('payrollPage').onclick = () => go('/admin/payroll.html');
    qs('reportsPage').onclick = () => go('/admin/reports.html');

    function dt(v) { return v ? new Date(v).toLocaleString() : '-'; }
    function dm(v) { return v == null ? 'غير متاح' : `${v} م`; }

    async function load() {
      try {
        setMsg('');
        const date = qs('date').value;
        const live = await api(`/api/admin/dashboard/live?date=${encodeURIComponent(date)}`);
        const daily = await api(`/api/admin/attendance?date=${encodeURIComponent(date)}`);

        qs('totalEmployees').textContent = live.totalEmployees;
        qs('onlineCount').textContent = live.onlineCount;
        qs('todayIn').textContent = daily.rows.filter((r) => r.checkIn).length;
        qs('todayOut').textContent = daily.rows.filter((r) => r.checkOut).length;

        qs('body').innerHTML = '';
        daily.rows.forEach((r) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${r.name}</td><td>${dt(r.checkIn)}</td><td>${dt(r.checkOut)}</td><td>${dm(r.checkInDistance)}</td><td>${dm(r.checkOutDistance)}</td>`;
          qs('body').appendChild(tr);
        });
      } catch (error) {
        if (String(error.message).includes('Unauthorized')) return go('/admin/login.html');
        setMsg(error.message);
      }
    }

    qs('loadBtn').onclick = load;
    load();
  </script>
</body>
</html>
