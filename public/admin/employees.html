<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#2a8fc4" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>&#1573;&#1583;&#1575;&#1585;&#1577; &#1575;&#1604;&#1605;&#1608;&#1592;&#1601;&#1610;&#1606; - &#1573;&#1606;&#1580;&#1575;&#1586;</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body class="bg">
  <div class="shell">
    <div class="card wide">
      <div class="top">
        <div>
          <h1>&#1573;&#1583;&#1575;&#1585;&#1577; &#1575;&#1604;&#1605;&#1608;&#1592;&#1601;&#1610;&#1606;</h1>
          <div class="muted">&#1573;&#1590;&#1575;&#1601;&#1577; &#1605;&#1608;&#1592;&#1601;&#1610;&#1606; &#1608;&#1578;&#1593;&#1583;&#1610;&#1604; &#1575;&#1604;&#1585;&#1608;&#1575;&#1578;&#1576; &#1608;&#1581;&#1584;&#1601; &#1575;&#1604;&#1605;&#1608;&#1592;&#1601;</div>
        </div>
        <div class="navbar">
          <button class="link" id="dashboardPage">&#1604;&#1608;&#1581;&#1577; &#1575;&#1604;&#1573;&#1583;&#1575;&#1585;&#1577;</button>
          <button class="link" id="payrollPage">&#1575;&#1604;&#1585;&#1608;&#1575;&#1578;&#1576;</button>
          <button class="link" id="reportsPage">&#1575;&#1604;&#1578;&#1602;&#1575;&#1585;&#1610;&#1585;</button>
        </div>
      </div>

      <div class="box">
        <h2>&#1573;&#1590;&#1575;&#1601;&#1577; &#1605;&#1608;&#1592;&#1601;</h2>
        <div class="row">
          <div class="field"><label>&#1575;&#1604;&#1575;&#1587;&#1605;</label><input id="name" /></div>
          <div class="field"><label>&#1575;&#1587;&#1605; &#1575;&#1604;&#1605;&#1587;&#1578;&#1582;&#1583;&#1605;</label><input id="username" /></div>
          <div class="field"><label>&#1603;&#1604;&#1605;&#1577; &#1575;&#1604;&#1605;&#1585;&#1608;&#1585;</label><input id="password" type="password" /></div>
          <div class="field"><label>&#1575;&#1604;&#1571;&#1580;&#1585; &#1576;&#1575;&#1604;&#1587;&#1575;&#1593;&#1577;</label><input id="hourlyRate" type="number" min="0" step="0.01" value="0" /></div>
          <div class="field"><label>&#1575;&#1604;&#1585;&#1575;&#1578;&#1576; &#1575;&#1604;&#1571;&#1587;&#1575;&#1587;&#1610;</label><input id="baseSalary" type="number" min="0" step="0.01" value="0" /></div>
          <div class="field"><label>&#1583;&#1608;&#1575;&#1605; &#1585;&#1587;&#1605;&#1610;</label><input id="scheduledStart" type="time" value="09:00" /></div>
          <div class="field"><label>&#1575;&#1587;&#1578;&#1585;&#1575;&#1581;&#1577; (&#1583;&#1602;&#1610;&#1602;&#1577;)</label><input id="breakMinutes" type="number" min="0" value="60" /></div>
          <button class="btn" id="createBtn">&#1573;&#1590;&#1575;&#1601;&#1577;</button>
        </div>
      </div>

      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>&#1575;&#1604;&#1575;&#1587;&#1605;</th>
              <th>&#1575;&#1604;&#1605;&#1587;&#1578;&#1582;&#1583;&#1605;</th>
              <th>&#1606;&#1588;&#1591;</th>
              <th>&#1580;&#1607;&#1575;&#1586; &#1605;&#1602;&#1610;&#1583;</th>
              <th>&#1571;&#1580;&#1585; &#1575;&#1604;&#1587;&#1575;&#1593;&#1577;</th>
              <th>&#1585;&#1575;&#1578;&#1576; &#1571;&#1587;&#1575;&#1587;&#1610;</th>
              <th>&#1583;&#1608;&#1575;&#1605;</th>
              <th>&#1575;&#1587;&#1578;&#1585;&#1575;&#1581;&#1577;</th>
              <th style="min-width:360px">&#1573;&#1580;&#1585;&#1575;&#1569;&#1575;&#1578;</th>
            </tr>
          </thead>
          <tbody id="body"></tbody>
        </table>
      </div>

      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script src="/assets/js/common.js"></script>
  <script>
    if (!ensureAuthOrRedirect('/admin/login.html')) throw new Error('auth required');

    qs('dashboardPage').onclick = () => go('/admin/dashboard.html');
    qs('payrollPage').onclick = () => go('/admin/payroll.html');
    qs('reportsPage').onclick = () => go('/admin/reports.html');

    function num(v, fallback = 0) {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    async function loadEmployees() {
      const data = await api('/api/admin/employees');
      qs('body').innerHTML = '';

      data.rows.filter((r) => r.role === 'employee').forEach((r) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.name || '-'}</td>
          <td>${r.username || '-'}</td>
          <td>${r.is_active ? '\u0646\u0639\u0645' : '\u0644\u0627'}</td>
          <td>${r.device_id ? '\u0645\u0642\u064A\u062F' : '-'}</td>
          <td><input data-id="${r.id}" data-key="hourlyRate" type="number" step="0.01" value="${num(r.hourly_rate)}" /></td>
          <td><input data-id="${r.id}" data-key="baseSalary" type="number" step="0.01" value="${num(r.base_salary)}" /></td>
          <td><input data-id="${r.id}" data-key="scheduledStart" type="time" value="${String(r.scheduled_start || '09:00').slice(0, 5)}" /></td>
          <td><input data-id="${r.id}" data-key="breakMinutes" type="number" value="${num(r.break_minutes, 60)}" /></td>
          <td>
            <div class="actionsRow">
              <button class="btn ghost btn-sm" data-act="save" data-id="${r.id}">&#1581;&#1601;&#1592;</button>
              <button class="btn ghost btn-sm" data-act="toggle" data-id="${r.id}">&#1578;&#1601;&#1593;&#1610;&#1604;/&#1578;&#1593;&#1591;&#1610;&#1604;</button>
              <button class="btn ghost btn-sm" data-act="reset" data-id="${r.id}">&#1573;&#1593;&#1575;&#1583;&#1577; &#1585;&#1576;&#1591;</button>
              <button class="btn red btn-sm" data-act="delete" data-id="${r.id}">&#1581;&#1584;&#1601;</button>
            </div>
          </td>
        `;
        qs('body').appendChild(tr);
      });
    }

    qs('createBtn').onclick = async () => {
      try {
        setMsg('');
        await api('/api/admin/employees', {
          method: 'POST',
          body: JSON.stringify({
            name: qs('name').value.trim(),
            username: qs('username').value.trim(),
            password: qs('password').value,
            hourlyRate: num(qs('hourlyRate').value),
            baseSalary: num(qs('baseSalary').value),
            scheduledStart: qs('scheduledStart').value || '09:00',
            breakMinutes: num(qs('breakMinutes').value, 60),
          }),
        });

        ['name', 'username', 'password'].forEach((id) => (qs(id).value = ''));
        setMsg('\u062A\u0645\u062A \u0625\u0636\u0627\u0641\u0629 \u0627\u0644\u0645\u0648\u0638\u0641', true);
        await loadEmployees();
      } catch (error) {
        setMsg(error.message);
      }
    };

    qs('body').onclick = async (event) => {
      const btn = event.target.closest('button');
      if (!btn) return;

      const id = btn.dataset.id;
      const action = btn.dataset.act;

      try {
        setMsg('');

        if (action === 'delete') {
          if (!confirm('\u0645\u062A\u0623\u0643\u062F \u0645\u0646 \u062D\u0630\u0641 \u0627\u0644\u0645\u0648\u0638\u0641\u061F \u0647\u0630\u0627 \u0627\u0644\u0625\u062C\u0631\u0627\u0621 \u0646\u0647\u0627\u0626\u064A.')) return;
          await api(`/api/admin/employees/${id}`, { method: 'DELETE' });
        } else if (action === 'toggle') {
          await api(`/api/admin/employees/${id}/toggle`, { method: 'POST' });
        } else if (action === 'reset') {
          await api(`/api/admin/employees/${id}/reset-device`, { method: 'POST' });
        } else if (action === 'save') {
          const hourlyRate = num(document.querySelector(`input[data-id="${id}"][data-key="hourlyRate"]`).value);
          const baseSalary = num(document.querySelector(`input[data-id="${id}"][data-key="baseSalary"]`).value);
          const scheduledStart = document.querySelector(`input[data-id="${id}"][data-key="scheduledStart"]`).value || '09:00';
          const breakMinutes = num(document.querySelector(`input[data-id="${id}"][data-key="breakMinutes"]`).value, 60);

          await api(`/api/admin/employees/${id}`, {
            method: 'PATCH',
            body: JSON.stringify({ hourlyRate, baseSalary, scheduledStart, breakMinutes }),
          });
        }

        setMsg('\u062A\u0645 \u0627\u0644\u062A\u0646\u0641\u064A\u0630', true);
        await loadEmployees();
      } catch (error) {
        setMsg(error.message);
      }
    };

    loadEmployees().catch((error) => {
      if (String(error.message).includes('Unauthorized')) return go('/admin/login.html');
      setMsg(error.message);
    });
  </script>
</body>
</html>
